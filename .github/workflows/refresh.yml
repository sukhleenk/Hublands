name: weekly refresh

on:
  schedule:
    - cron: "20 3 * * 1" # Mondays 03:20 UTC, after librarian-bots daily rebuild
  workflow_dispatch:

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HUBLANDS_DATA_REPO: ${{ vars.HUBLANDS_DATA_REPO }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Restore card cache
        uses: actions/cache@v4
        with:
          path: pipeline/.cache
          key: readme-cache-${{ github.run_id }}
          restore-keys: readme-cache-

      - name: Run incremental refresh
        working-directory: pipeline
        run: |
          uv sync --frozen || uv sync
          uv run python -m atlas.refresh --repo "$HUBLANDS_DATA_REPO"

      - name: Commit new cluster labels if any
        run: |
          if ! git diff --quiet labels/labels.json 2>/dev/null; then
            git config user.name "hublands-refresh"
            git config user.email "actions@users.noreply.github.com"
            git add labels/labels.json
            git commit -m "chore: labels for new clusters from weekly refresh"
            git push
          fi
